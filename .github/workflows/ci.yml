name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov httpx
          pip install -e .
      - name: Lint
        run: ruff check src/ app/ tests/
      - name: Type check
        run: mypy src/ app/
      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_integration.py
      - name: Integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short
      - name: Verify Docker build
        run: docker build -t test-image .
